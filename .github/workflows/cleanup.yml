name: Cleanup

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to clean up"
        required: true
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cleanup:
    name: Cleanup and Open PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Apply formatting
        run: cargo fmt --all

      - name: Remove generated and junk files
        shell: pwsh
        run: .\.github\scripts\cleanup-files.ps1

      - name: Create cleanup pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "chore/automated-cleanup"
          base: ${{ inputs.target_branch }}
          commit-message: "chore: automated repository cleanup"
          title: "chore: automated repository cleanup"
          body: |
            ## Summary
            Automated cleanup generated by the manual Cleanup workflow.

            ## Included changes
            - Ran `cargo fmt --all`
            - Removed junk/generated files via `.github/scripts/cleanup-files.ps1`
          labels: |
            REFACTO
            CICD
            hackathon
